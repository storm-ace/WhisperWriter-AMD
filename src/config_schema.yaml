# Configuration options for the Whisper models
model_options:
  engine:
    value: faster-whisper
    type: str
    description: "Transcription engine / compute target. 'faster-whisper' = in-process CPU (default, works out of the box; ctranslate2 has no AMD GPU path so it is CPU-only here). 'whispercpp' = GPU via Vulkan — the AMD GPU/iGPU option (requires a whisper.cpp Vulkan build + ggml model; see README)."
    options:
      - faster-whisper
      - whispercpp

  # Common configuration options for both API and local models
  common:
    language:
      value: null
      type: str
      description: "The language code for the transcription in ISO-639-1 format."
    temperature:
      value: 0.0
      type: float
      description: "Controls the randomness of the transcription output. Lower values make the output more focused and deterministic."
    initial_prompt:
      value: null
      type: str
      description: "A string used as an initial prompt to bias the transcription (e.g. domain-specific terms or names)."

  # Configuration options for the faster-whisper model
  local:
    model:
      value: base
      type: str
      description: "The model to use for transcription. The larger models provide better accuracy but are slower."
      options:
        - base
        - base.en
        - tiny
        - tiny.en
        - small
        - small.en
        - medium
        - medium.en
        - large
        - large-v1
        - large-v2
        - large-v3
    device:
      value: cpu
      type: str
      description: "Device for the faster-whisper engine. On this AMD build only 'cpu' is supported — ctranslate2 has no AMD GPU path and CUDA needs NVIDIA. For GPU acceleration on AMD, set Engine to 'whispercpp' (Vulkan) above."
      options:
        - cpu
    compute_type:
      value: default
      type: str
      description: "The compute type to use for the local Whisper model."
      options:
        - default
        - float32
        - float16
        - int8
    condition_on_previous_text:
      value: true
      type: bool
      description: "Set to true to use the previously transcribed text as a prompt for the next transcription request."
    vad_filter:
      value: false
      type: bool
      description: "Set to true to use a voice activity detection (VAD) filter to remove silence from the recording."
    model_path:
      value: null
      type: str
      description: "The path to the local Whisper model. If not specified, the default model will be downloaded."

  # Configuration for the whisper.cpp server engine (GPU via Vulkan, e.g. AMD iGPUs)
  whispercpp:
    binary_path:
      value: null
      type: str
      description: "Full path to whisper-server.exe (the whisper.cpp HTTP server built with Vulkan)."
    model_path:
      value: null
      type: str
      description: "Full path to the ggml model file (e.g. ggml-large-v3.bin). Note: ggml format, not the faster-whisper format."
    lib_path:
      value: null
      type: str
      description: "Directory holding extra runtime DLLs the server needs (e.g. the MinGW bin dir with libstdc++/libgomp). Added to PATH when launching."
    host:
      value: 127.0.0.1
      type: str
      description: "Host the whisper.cpp server listens on."
    port:
      value: 8080
      type: int
      description: "Port the whisper.cpp server listens on."
    n_threads:
      value: null
      type: int
      description: "Number of CPU threads for the server. Leave empty for the default."
    auto_start:
      value: true
      type: bool
      description: "Set to true to let WhisperWriter launch and stop the whisper.cpp server automatically."

# Configuration options for activation and recording
recording_options:
  activation_key:
    value: ctrl+shift+space
    type: str
    description: "Shortcut to activate recording/transcribing. Keyboard keys joined with '+' (e.g. ctrl+shift+space), or a mouse button: mouse_back, mouse_forward, mouse_left, mouse_right, mouse_middle."
  activation_key_no_enter:
    value: null
    type: str
    description: "Optional second shortcut that dictates WITHOUT pressing Enter afterwards, regardless of the press_enter setting. Same format as activation_key (keyboard combo or a mouse button, e.g. mouse_forward). Leave empty to disable."
  input_backend:
    value: auto
    type: str
    description: "The input backend to use for detecting key presses. 'auto' will try to use the best available backend."
    options:
      - auto
      - evdev
      - pynput
  recording_mode:
    value: continuous
    type: str
    description: "The recording mode to use. Options include continuous (auto-restart recording after pause in speech until activation key is pressed again), voice_activity_detection (stop recording after pause in speech), press_to_toggle (stop recording when activation key is pressed again), hold_to_record (stop recording when activation key is released)."
    options:
      - continuous
      - voice_activity_detection
      - press_to_toggle
      - hold_to_record
  sound_device:
    value: null
    type: str
    description: "The numeric index of the sound device to use for recording. To find device numbers, run `python -m sounddevice`"
  sample_rate:
    value: 16000
    type: int
    description: "The sample rate in Hz to use for recording."
  silence_duration:
    value: 900
    type: int
    description: "The duration in milliseconds to wait for silence before stopping the recording."
  min_duration:
    value: 100
    type: int
    description: "The minimum duration in milliseconds for a recording to be processed. Recordings shorter than this will be discarded."

# Post-processing options for the transcribed text
post_processing:
  writing_key_press_delay:
    value: 0.005
    type: float
    description: "The delay in seconds between each key press when writing the transcribed text."
  remove_trailing_period:
    value: false
    type: bool
    description: "Set to true to remove the trailing period from the transcribed text."
  add_trailing_space:
    value: true
    type: bool
    description: "Set to true to add a space to the end of the transcribed text."
  remove_capitalization:
    value: false
    type: bool
    description: "Set to true to convert the transcribed text to lowercase."
  input_method:
    value: pynput
    type: str
    description: "The method to use for inserting text. 'clipboard' pastes via Ctrl+V (instant, no dropped characters); the others type character-by-character."
    options:
      - pynput
      - clipboard
      - ydotool
      - dotool
  press_enter:
    value: false
    type: bool
    description: "Set to true to press Enter after inserting the text (e.g. to submit a chat message)."
  restore_clipboard:
    value: true
    type: bool
    description: "Only for input_method 'clipboard'. Set to true to restore the previous clipboard contents after pasting. Set to false to leave the dictated text on the clipboard, so you can manually Ctrl+V again if the automatic paste failed."
  word_replacements:
    value: ""
    type: str
    description: "Automatic find-and-replace applied after each transcription, to fix words the model consistently mishears (names, brands, jargon). One rule per line in the form 'wrong = right' (or 'wrong -> right'). Whole-word and case-insensitive. Example: cloud code = Claude Code"

# Miscellaneous settings
misc:
  print_to_terminal:
    value: true
    type: bool
    description: "Set to true to print the script status and transcribed text to the terminal."
  hide_status_window:
    value: false
    type: bool
    description: "Set to true to hide the status window during operation."
  noise_on_completion:
    value: false
    type: bool
    description: "Set to true to play a noise after the transcription has been typed out."
